apply.process.eyebrow=Apply
apply.process.title=Hiring process
apply.process.lead=The journey from application review to final offer is shown as a clear step-by-step flow.
apply.process.steps.step1.stage=STEP 1
apply.process.steps.step1.title=Application review
apply.process.steps.step1.description=We review role fit and growth potential together through your resume, experience summary, and portfolio.
apply.process.steps.step1.note=Show concrete examples of impact and problem solving where possible.
apply.process.steps.step2.stage=STEP 2
apply.process.steps.step2.title=SKCT / A!SK
apply.process.steps.step2.description=We assess the thinking style and core capabilities needed for the role and organization from multiple angles.
apply.process.steps.step2.note=Please review the preparation guide and schedule details in advance.
apply.process.steps.step3.stage=STEP 3
apply.process.steps.step3.title=Interviews
apply.process.steps.step3.description=Several conversations focus on role expertise, collaboration style, and organizational fit.
apply.process.steps.step3.note=It helps to explain the judgment behind your decisions and your collaboration examples.
apply.process.steps.step4.stage=STEP 4
apply.process.steps.step4.title=Final offer and onboarding
apply.process.steps.step4.description=We align on offer details and onboarding timing, then support your early transition after joining.
apply.process.steps.step4.note=You can ask about working environment or programs at any point before joining.
apply.faq.eyebrow=FAQ
apply.faq.title=Frequently asked questions
apply.faq.lead=Questions candidates often ask are organized into searchable accordion categories.
apply.faq.searchLabel=Search questions
apply.faq.searchPlaceholder=For example: portfolio, English, visa
apply.faq.empty=No results matched your search. Please try another keyword.
apply.faq.categories.application.title=Application prep
apply.faq.categories.application.resume.question=How detailed should my experience summary be?
apply.faq.categories.application.resume.answer=It helps to summarize the project goal, your role, the tools you used, and the outcomes in a way that can be understood quickly.
apply.faq.categories.application.portfolio.question=Is a portfolio required?
apply.faq.categories.application.portfolio.answer=It is not mandatory for every role, but it is strongly recommended if you can show outputs or your problem-solving approach.
apply.faq.categories.application.timeline.question=When will I hear back about each stage?
apply.faq.categories.application.timeline.answer=Results are shared according to the timeline announced for each stage, and delays are communicated separately when needed.
apply.faq.categories.interview.title=Interview logistics
apply.faq.categories.interview.format.question=Are interviews in person or remote?
apply.faq.categories.interview.format.answer=Depending on the role and situation, interviews may be in person, remote, or a mix of both. The invitation email will explain the format.
apply.faq.categories.interview.language.question=Can part of the interview be in English?
apply.faq.categories.interview.language.answer=Some globally collaborative roles may include a light English communication check.
apply.faq.categories.interview.feedback.question=What matters most when preparing for interviews?
apply.faq.categories.interview.feedback.answer=Rather than listing experience, explain what you judged, why you decided that way, and what you learned from it.
apply.faq.categories.global.title=Global applicants
apply.faq.categories.global.english.question=Can I submit my application in English?
apply.faq.categories.global.english.answer=Yes. The /en/* routes provide the same structure in English, and English applications are supported.
apply.faq.categories.global.relocation.question=Can overseas candidates apply as well?
apply.faq.categories.global.relocation.answer=Yes, depending on the role and legal entity. Visa or relocation support is explained in each opening.
apply.faq.categories.global.visa.question=How is visa support handled?
apply.faq.categories.global.visa.answer=Once hiring is confirmed, eligible candidates receive a separate guide on the required documents and process.
