apply.process.eyebrow=Apply
apply.process.title=채용 절차
apply.process.lead=서류전형부터 최종 합격까지의 흐름을 단계형 UI로 구성해 지원자가 전체 여정을 쉽게 이해할 수 있도록 했습니다.
apply.process.steps.step1.stage=STEP 1
apply.process.steps.step1.title=서류전형
apply.process.steps.step1.description=지원서와 경력/포트폴리오를 바탕으로 직무 적합성과 성장 가능성을 함께 검토합니다.
apply.process.steps.step1.note=핵심 경험과 문제 해결 사례를 구체적으로 작성해 주세요.
apply.process.steps.step2.stage=STEP 2
apply.process.steps.step2.title=SKCT / A!SK
apply.process.steps.step2.description=직무 및 조직에 필요한 사고 방식과 역량을 다각도로 확인합니다.
apply.process.steps.step2.note=안내 메일과 준비 가이드를 사전에 충분히 확인해 주세요.
apply.process.steps.step3.stage=STEP 3
apply.process.steps.step3.title=면접전형
apply.process.steps.step3.description=직무 전문성, 협업 방식, 조직 적합성을 중심으로 여러 라운드의 대화를 진행합니다.
apply.process.steps.step3.note=본인의 판단 기준과 협업 경험을 사례로 설명하면 좋습니다.
apply.process.steps.step4.stage=STEP 4
apply.process.steps.step4.title=최종 합격 및 입사
apply.process.steps.step4.description=처우 안내와 온보딩 일정을 조율하고, 입사 후 초기 적응을 지원합니다.
apply.process.steps.step4.note=입사 전 궁금한 제도와 환경은 언제든 문의할 수 있습니다.
apply.faq.eyebrow=FAQ
apply.faq.title=자주 묻는 질문
apply.faq.lead=지원자가 실제로 많이 묻는 질문을 카테고리별 아코디언으로 정리했습니다.
apply.faq.searchLabel=질문 검색
apply.faq.searchPlaceholder=예: 포트폴리오, 영어, 비자
apply.faq.empty=검색 결과가 없습니다. 다른 키워드로 다시 시도해 주세요.
apply.faq.categories.application.title=지원 준비
apply.faq.categories.application.resume.question=경력 기술서는 어느 수준까지 작성해야 하나요?
apply.faq.categories.application.resume.answer=프로젝트 목적, 맡은 역할, 사용한 도구, 성과를 한눈에 이해할 수 있도록 요약하면 좋습니다.
apply.faq.categories.application.portfolio.question=포트폴리오는 필수인가요?
apply.faq.categories.application.portfolio.answer=직무에 따라 필수는 아니지만, 산출물이나 문제 해결 방식을 보여줄 수 있다면 적극 권장합니다.
apply.faq.categories.application.timeline.question=전형 결과는 언제 확인할 수 있나요?
apply.faq.categories.application.timeline.answer=단계별 결과는 안내 일정에 따라 순차적으로 전달되며, 지연 시 별도 고지를 드립니다.
apply.faq.categories.interview.title=면접 진행
apply.faq.categories.interview.format.question=면접은 대면인가요 비대면인가요?
apply.faq.categories.interview.format.answer=직무와 상황에 따라 대면/비대면이 혼합될 수 있으며 안내 메일에서 구체적으로 확인할 수 있습니다.
apply.faq.categories.interview.language.question=영어 면접이 진행될 수 있나요?
apply.faq.categories.interview.language.answer=글로벌 협업이 많은 직무는 일부 영어 커뮤니케이션 확인이 포함될 수 있습니다.
apply.faq.categories.interview.feedback.question=면접 준비에서 가장 중요한 점은 무엇인가요?
apply.faq.categories.interview.feedback.answer=경험을 나열하기보다 어떤 판단을 했고 무엇을 배웠는지 구조적으로 설명하는 것이 좋습니다.
apply.faq.categories.global.title=글로벌 지원
apply.faq.categories.global.english.question=영문 지원서도 가능한가요?
apply.faq.categories.global.english.answer=네. /en/* 경로 기준으로 동일한 구조의 영문 경험을 제공하며 영문 지원도 가능합니다.
apply.faq.categories.global.relocation.question=해외 지원자도 지원할 수 있나요?
apply.faq.categories.global.relocation.answer=직무와 법인 상황에 따라 가능하며, 비자와 relocation 지원 여부는 공고별로 안내됩니다.
apply.faq.categories.global.visa.question=비자 지원은 어떻게 이뤄지나요?
apply.faq.categories.global.visa.answer=채용 확정 후 대상자에게 필요한 서류와 절차를 별도 안내합니다.
