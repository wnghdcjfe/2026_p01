job.interview.eyebrow=Interview
job.interview.title=Role interviews
job.interview.lead=Read how team members collaborate, grow, and solve problems in their own words.
job.interview.detail.quote=Key quote
job.interview.detail.story=Interview story
job.interview.detail.takeaways=Key takeaways
job.interviews.device-lead.title=A day in the life of a device lead who keeps finding the real problem
job.interviews.device-lead.summary=This interview shows how hypotheses, data checks, and team alignment come together in practice.
job.interviews.device-lead.person=Soyeon Kim
job.interviews.device-lead.role=Device Lead
job.interviews.device-lead.quote=I believe good questions lead to better yield improvements.
job.interviews.device-lead.story=When I face an issue, I start by separating the phenomenon into smaller parts.|Once the data is organized quickly, sharing hypotheses with partner teams speeds up execution dramatically.|Inside the team, we value the speed of learning even more than a single result.
job.interviews.device-lead.takeaways=Explain the problem in smaller pieces|Share experiment outcomes quickly|Align assumptions before collaboration starts
job.interviews.data-strategist.title=How a data strategist learns to speak the same language as the field
job.interviews.data-strategist.summary=This story explains how the analytics team builds a shared language with operating teams.
job.interviews.data-strategist.person=Alex Kim
job.interviews.data-strategist.role=Data Strategist
job.interviews.data-strategist.quote=Numbers do more than persuade people—they align the team around one direction.
job.interviews.data-strategist.story=Instead of building a complex dashboard first, we define the decision moment that matters.|When we use the field team's own words in metric names, adoption rises quickly.|Analysis should arrive with a recommended next action, not just a report.
job.interviews.data-strategist.takeaways=Start from the decision moment|Design metrics in the team's language|Pair analysis with the next action
job.interviews.culture-builder.title=How One Team shows up in a real project
job.interviews.culture-builder.summary=An employer-brand leader shares how different functions increased both speed and trust on one project.
job.interviews.culture-builder.person=Hyunwoo Lee
job.interviews.culture-builder.role=Employer Brand Manager
job.interviews.culture-builder.quote=Fast execution is not about one person moving fast—it is about the whole team moving faster together.
job.interviews.culture-builder.story=At the start of a project, aligning on outcomes before roles lowers friction.|Regular small demos help everyone share context around their work.|Even the way we celebrate outcomes becomes part of culture design.
job.interviews.culture-builder.takeaways=Align on outcomes first|Create a small-demo ritual|Review wins together
